<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập Công Nghệ Lớp 4</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:#FF7043; --orange-d:#BF360C; --amber:#FFC107; --amber-d:#FF8F00;
    --teal:#00BCD4; --teal-d:#006064; --green:#66BB6A; --green-d:#2E7D32;
    --red:#EF5350; --red-d:#B71C1C; --shadow:rgba(0,0,0,0.13);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Nunito",sans-serif;min-height:100vh;background:linear-gradient(150deg,#FFF8E1 0%,#FFE0B2 40%,#E8F5E9 100%);color:#3E2723;overflow-x:hidden}
  body::before{content:"⚙️🔧🪀";position:fixed;top:15px;left:-120px;font-size:52px;opacity:.12;animation:drift 28s linear infinite;pointer-events:none;z-index:0}
  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(110vw)}}
  .app{max-width:760px;margin:0 auto;padding:20px 16px 70px;position:relative;z-index:1}
  .header{text-align:center;margin-bottom:24px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes popIn{from{opacity:0;transform:scale(.7) translateY(-20px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .header .icons{font-size:50px;display:flex;justify-content:center;gap:8px;margin-bottom:6px}
  .header .icons span{animation:spin 4s ease-in-out infinite;display:inline-block}
  .header .icons span:nth-child(2){animation-delay:.5s}.header .icons span:nth-child(3){animation-delay:1s}
  @keyframes spin{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  .header h1{font-family:"Pacifico",cursive;font-size:clamp(22px,5vw,34px);color:var(--orange-d);text-shadow:0 3px 0 rgba(255,255,255,.8),0 5px 12px rgba(0,0,0,.1)}
  .header p{font-size:14px;color:var(--teal-d);font-weight:700;margin-top:4px}
  .scorebar{display:flex;justify-content:space-around;background:white;border-radius:22px;padding:10px 8px;margin-bottom:18px;box-shadow:0 4px 20px var(--shadow);animation:popIn .65s cubic-bezier(.34,1.56,.64,1) .1s both}
  .sc-item{text-align:center}.sc-item .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#90A4AE}
  .sc-item .val{font-family:"Pacifico",cursive;font-size:26px;line-height:1;color:var(--teal-d)}
  .sc-item .val.ok{color:var(--green-d)}.sc-item .val.bad{color:var(--red)}
  .progress-track{height:10px;background:#FFE0B2;border-radius:10px;margin-bottom:18px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.06)}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--amber));border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .card{background:white;border-radius:26px;padding:26px 22px;box-shadow:0 8px 32px var(--shadow);margin-bottom:18px;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) both;border-top:5px solid var(--orange)}
  @keyframes slideUp{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .q-badge{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:white;font-family:"Pacifico",cursive;font-size:14px;padding:5px 16px;border-radius:20px;letter-spacing:.04em}
  .q-tag{font-size:11px;font-weight:700;color:#90A4AE;text-transform:uppercase;letter-spacing:.06em}
  .q-text{font-family:"Pacifico",cursive;font-size:clamp(15px,3.5vw,20px);color:#3E2723;line-height:1.5;margin-bottom:20px;letter-spacing:.01em}
  #qImg{text-align:center;margin:0 0 18px;display:none}
  #qImg img{max-width:100%;max-height:280px;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.15);border:3px solid #FFE0B2}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;gap:12px;background:#FFF8F0;border:2.5px solid #FFCCBC;border-radius:16px;padding:13px 16px;cursor:pointer;font-size:15px;font-weight:600;color:#4E342E;transition:all .17s ease;text-align:left;width:100%;font-family:"Nunito",sans-serif}
  .opt:hover:not(:disabled){background:#FFE0B2;border-color:var(--orange);transform:translateX(5px);box-shadow:0 4px 14px rgba(255,112,67,.22)}
  .opt .ltr{min-width:32px;width:32px;height:32px;border-radius:50%;background:white;border:2px solid #FFCCBC;display:flex;align-items:center;justify-content:center;font-family:"Pacifico",cursive;font-size:15px;color:var(--orange-d);transition:all .17s;flex-shrink:0}
  .opt:disabled{cursor:default}
  .opt.correct{background:#E8F5E9;border-color:var(--green);color:var(--green-d);animation:boing .4s cubic-bezier(.34,1.56,.64,1)}
  .opt.correct .ltr{background:var(--green);border-color:var(--green);color:white}
  .opt.wrong{background:#FFEBEE;border-color:var(--red);color:var(--red-d);animation:jiggle .4s ease}
  .opt.wrong .ltr{background:var(--red);border-color:var(--red);color:white}
  @keyframes boing{0%{transform:scale(1)}50%{transform:scale(1.04) translateX(4px)}100%{transform:scale(1)}}
  @keyframes jiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .fb{display:none;margin-top:14px;padding:13px 16px;border-radius:14px;font-size:15px;font-weight:700;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .fb.ok{background:#E8F5E9;border:2px solid var(--green);color:var(--green-d)}
  .fb.bad{background:#FFF3E0;border:2px solid var(--amber);color:var(--amber-d)}
  .fb .emo{font-size:20px;margin-right:6px}
  .ans-box{display:none;margin-top:14px;background:#FFF8E1;border:2.5px solid var(--amber);border-radius:16px;padding:16px;animation:fadeIn .4s ease}
  .ans-box .ans-hd{font-family:"Pacifico",cursive;font-size:13px;color:var(--amber-d);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .ans-box .ans-body{font-size:14px;line-height:1.85;color:#5D4037;white-space:pre-line;font-weight:600}
  .fill-section{background:#FFF3E0;border:2px solid var(--amber);border-radius:14px;padding:16px;font-size:15px;font-weight:600;color:#5D4037;line-height:2.4}
  .fill-blank{display:inline-block;min-width:100px;background:white;border:2px dashed var(--orange);border-radius:8px;padding:2px 10px;color:var(--orange-d);font-weight:700;cursor:default;transition:all .3s}
  .fill-blank.revealed{background:#E8F5E9;border:2px solid var(--green);color:var(--green-d)}
  .show-btn{display:none;margin-top:14px;background:linear-gradient(135deg,var(--amber),var(--amber-d));color:white;border:none;border-radius:14px;padding:12px 24px;font-family:"Pacifico",cursive;font-size:16px;cursor:pointer;box-shadow:0 4px 14px rgba(255,143,0,.35);transition:all .17s;letter-spacing:.03em}
  .show-btn:hover{transform:translateY(-2px)}
  .next-btn{display:none;width:100%;margin-top:14px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:white;border:none;border-radius:18px;padding:16px;font-family:"Pacifico",cursive;font-size:19px;cursor:pointer;box-shadow:0 6px 22px rgba(0,96,100,.3);transition:all .17s;letter-spacing:.04em}
  .next-btn:hover{transform:translateY(-3px)}
  .home{animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both}
  .home-card{background:white;border-radius:26px;padding:26px 22px;box-shadow:0 8px 32px var(--shadow);border-top:5px solid var(--amber)}
  .mode-title{font-family:"Pacifico",cursive;font-size:20px;color:var(--orange-d);text-align:center;margin-bottom:18px;letter-spacing:.04em}
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .mode-btn{background:#FFF8F0;border:3px solid #FFCCBC;border-radius:20px;padding:18px 12px;cursor:pointer;text-align:center;transition:all .2s;font-family:"Pacifico",cursive}
  .mode-btn:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:0 8px 22px rgba(255,112,67,.18)}
  .mode-btn.sel{border-color:var(--orange);background:#FFF3E0}
  .mode-btn .mi{font-size:38px;display:block;margin-bottom:6px}
  .mode-btn .mn{font-size:16px;font-weight:800;display:block;color:var(--orange-d)}
  .mode-btn .md{font-size:12px;font-weight:600;color:#90A4AE;display:block;margin-top:3px;font-family:"Nunito",sans-serif}
  .start-btn{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange-d));color:white;border:none;border-radius:18px;padding:18px;font-family:"Pacifico",cursive;font-size:22px;cursor:pointer;box-shadow:0 8px 24px rgba(191,54,12,.32);transition:all .18s;letter-spacing:.04em}
  .start-btn:hover{transform:translateY(-3px) scale(1.01)}
  .results{display:none;animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both}
  .res-card{background:white;border-radius:28px;padding:36px 26px;box-shadow:0 12px 44px var(--shadow);text-align:center;border-top:6px solid var(--orange)}
  .trophy{font-size:86px;display:block;margin-bottom:8px;animation:trophyBounce .8s cubic-bezier(.34,1.56,.64,1) .2s both}
  @keyframes trophyBounce{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
  .res-title{font-family:"Pacifico",cursive;font-size:30px;color:var(--orange-d);letter-spacing:.04em}
  .res-score{font-family:"Pacifico",cursive;font-size:60px;background:linear-gradient(135deg,var(--orange-d),var(--amber-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:10px 0}
  .res-msg{font-size:16px;color:#546E7A;font-weight:700;margin-bottom:22px}
  .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
  .res-stat{background:#FFF8F0;border-radius:16px;padding:14px}
  .res-stat .sv{font-family:"Pacifico",cursive;font-size:30px}
  .res-stat .sl{font-size:13px;font-weight:700;color:#90A4AE}
  .res-stat.g .sv{color:var(--green-d)}.res-stat.r .sv{color:var(--red)}
  .restart-btn{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:white;border:none;border-radius:18px;padding:18px 44px;font-family:"Pacifico",cursive;font-size:21px;cursor:pointer;box-shadow:0 8px 24px rgba(191,54,12,.32);transition:all .18s;letter-spacing:.04em}
  .restart-btn:hover{transform:translateY(-3px) scale(1.02)}
  .cfwrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;overflow:hidden}
  .cf{position:absolute;border-radius:2px;animation:cffall linear forwards}
  @keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  @media(max-width:480px){.mode-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="icons"><span>⚙️</span><span>🔧</span><span>🪀</span></div>
    <h1>Ôn Tập Công Nghệ</h1>
    <p>🛠️ Lớp 4 – Cuối Học Kì II</p>
  </div>

  <div class="home" id="homeScreen">
    <div class="home-card">
      <div class="mode-title">🎮 Chọn chế độ ôn tập</div>
      <div class="mode-grid">
        <div class="mode-btn sel" id="m-all" onclick="pickMode('all')"><span class="mi">📋</span><span class="mn">Tất Cả</span><span class="md">21 câu hỏi</span></div>
        <div class="mode-btn" id="m-tn" onclick="pickMode('tn')"><span class="mi">🅰️</span><span class="mn">Trắc Nghiệm</span><span class="md">16 câu hỏi</span></div>
        <div class="mode-btn" id="m-tl" onclick="pickMode('tl')"><span class="mi">✍️</span><span class="mn">Tự Luận</span><span class="md">5 câu hỏi</span></div>
        <div class="mode-btn" id="m-rd" onclick="pickMode('rd')"><span class="mi">🎲</span><span class="mn">Ngẫu Nhiên</span><span class="md">10 câu bất kỳ</span></div>
      </div>
      <button class="start-btn" onclick="startGame()">🚀 Bắt đầu ôn tập!</button>
    </div>
  </div>

  <div id="quizScreen" style="display:none;">
    <div class="scorebar">
      <div class="sc-item"><div class="lbl">Câu</div><div class="val" id="scQ">1</div></div>
      <div class="sc-item"><div class="lbl">Đúng</div><div class="val ok" id="scOk">0</div></div>
      <div class="sc-item"><div class="lbl">Sai</div><div class="val bad" id="scBad">0</div></div>
      <div class="sc-item"><div class="lbl">Còn lại</div><div class="val" id="scLeft">0</div></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="pBar" style="width:0%"></div></div>
    <div class="card" id="qCard">
      <div class="q-meta">
        <span class="q-badge" id="qBadge">Câu 1</span>
        <span class="q-tag" id="qTag">Trắc nghiệm</span>
      </div>
      <div class="q-text" id="qText"></div>
      <div id="qImg"><img src="" alt="Hinh minh hoa"/></div>
      <div id="optsArea"></div>
      <div class="fb" id="fb"></div>
      <div class="ans-box" id="ansBox"><div class="ans-hd">✅ Đáp án gợi ý</div><div class="ans-body" id="ansBody"></div></div>
      <button class="show-btn" id="showBtn" onclick="revealAnswer()">💡 Xem đáp án</button>
      <button class="next-btn" id="nextBtn" onclick="goNext()">Câu tiếp theo →</button>
    </div>
  </div>

  <div class="results" id="resScreen">
    <div class="res-card">
      <span class="trophy" id="rTrophy">🏆</span>
      <div class="res-title" id="rTitle">Xuất sắc!</div>
      <div class="res-score" id="rScore">0/0</div>
      <div class="res-msg" id="rMsg"></div>
      <div class="res-grid">
        <div class="res-stat g"><div class="sv" id="rOk">0</div><div class="sl">✅ Câu đúng</div></div>
        <div class="res-stat r"><div class="sv" id="rBad">0</div><div class="sl">❌ Câu sai</div></div>
      </div>
      <button class="restart-btn" onclick="goHome()">🏠 Chơi lại</button>
    </div>
  </div>
</div>
<div class="cfwrap" id="cfWrap"></div>

let mode="all", qs=[], cur=0, ok=0, bad=0, answered=false;

function pickMode(m) {
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("sel"));
  document.getElementById("m-"+m).classList.add("sel");
}

function shuffle(a) {
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}

function startGame() {
  let pool=[...QS];
  if(mode==="tn") pool=pool.filter(q=>q.t==="tn");
  else if(mode==="tl") pool=pool.filter(q=>q.t==="tl");
  else if(mode==="rd") pool=shuffle(pool).slice(0,10);
  qs=pool; cur=0; ok=0; bad=0;
  document.getElementById("homeScreen").style.display="none";
  document.getElementById("resScreen").style.display="none";
  document.getElementById("quizScreen").style.display="block";
  updateSB(); render();
}

function updateSB() {
  document.getElementById("scQ").textContent=cur+1;
  document.getElementById("scOk").textContent=ok;
  document.getElementById("scBad").textContent=bad;
  document.getElementById("scLeft").textContent=qs.length-cur;
  document.getElementById("pBar").style.width=(cur/qs.length*100)+"%";
  document.getElementById("qBadge").textContent="Câu "+(cur+1)+"/"+qs.length;
}

function render() {
  answered=false;
  const q=qs[cur];
  const card=document.getElementById("qCard");
  card.style.animation="none";
  setTimeout(()=>card.style.animation="slideUp .4s cubic-bezier(.34,1.56,.64,1) both",10);
  document.getElementById("qText").textContent=q.q;
  document.getElementById("qTag").textContent=q.t==="tn"?"⚙️ Trắc nghiệm":"✏️ Tự luận";
  document.getElementById("fb").style.display="none";
  document.getElementById("ansBox").style.display="none";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("showBtn").style.display="none";

  const imgWrap=document.getElementById("qImg");
  if(q.img) {
    imgWrap.querySelector("img").src = q.img==="IMG_ROBOT" ? IMG_ROBOT : IMG_TOYS;
    imgWrap.style.display="block";
  } else {
    imgWrap.style.display="none";
  }

  const area=document.getElementById("optsArea");
  area.innerHTML="";

  if(q.fillBlanks) {
    const div=document.createElement("div"); div.className="fill-section";
    let text=q.fillBlanks;
    q.fillAnswers.forEach(ans=>{
      const blank=`<span class="fill-blank" data-ans="${ans}">${"_".repeat(ans.length>8?12:8)}</span>`;
      text=text.replace("[___]",blank);
    });
    div.innerHTML=text;
    area.appendChild(div);
    const hint=document.createElement("p");
    hint.style.cssText="font-size:13px;color:#90A4AE;text-align:center;margin-top:10px;font-weight:700;";
    hint.textContent="💡 Nhấn Xem đáp án để kiểm tra";
    area.appendChild(hint);
    document.getElementById("ansBody").textContent=q.ans;
    document.getElementById("showBtn").style.display="block";
  } else if(q.t==="tn") {
    const wrap=document.createElement("div"); wrap.className="opts";
    q.o.forEach((opt,i)=>{
      const btn=document.createElement("button"); btn.className="opt";
      btn.innerHTML=`<span class="ltr">${LT[i]}</span><span>${opt}</span>`;
      btn.onclick=()=>pick(i);
      wrap.appendChild(btn);
    });
    area.appendChild(wrap);
  } else {
    const hint=document.createElement("p");
    hint.style.cssText="font-size:14px;color:#90A4AE;text-align:center;padding:22px 0;font-weight:700;";
    hint.textContent="🤔 Hãy suy nghĩ câu trả lời, rồi nhấn xem đáp án!";
    area.appendChild(hint);
    document.getElementById("ansBody").textContent=q.ans;
    document.getElementById("showBtn").style.display="block";
  }
}

function pick(chosen) {
  if(answered) return;
  answered=true;
  const q=qs[cur];
  const btns=document.querySelectorAll(".opt");
  btns.forEach(b=>b.disabled=true);
  const isOk=chosen===q.a;
  btns[chosen].classList.add(isOk?"correct":"wrong");
  if(!isOk){btns[q.a].classList.add("correct");bad++;}
  else{ok++;confetti(5);}
  const fb=document.getElementById("fb");
  fb.style.display="block";
  if(isOk){
    fb.className="fb ok";
    fb.innerHTML='<span class="emo">⭐</span> Chính xác! Giỏi lắm!';
  }else{
    fb.className="fb bad";
    fb.innerHTML=`<span class="emo">💪</span> Chưa đúng! Đáp án đúng là <strong>${LT[q.a]}. ${q.o[q.a]}</strong>`;
  }
  updateSB();
  const nb=document.getElementById("nextBtn");
  nb.style.display="block";
  nb.textContent=cur<qs.length-1?"Câu tiếp theo →":"🏁 Xem kết quả";
}

function revealAnswer() {
  document.querySelectorAll(".fill-blank").forEach(el=>{
    el.textContent=el.dataset.ans; el.classList.add("revealed");
  });
  document.getElementById("ansBox").style.display="block";
  document.getElementById("showBtn").style.display="none";
  const nb=document.getElementById("nextBtn");
  nb.style.display="block";
  nb.textContent=cur<qs.length-1?"Câu tiếp theo →":"🏁 Xem kết quả";
  ok++; updateSB();
}

function goNext() {
  cur++;
  if(cur>=qs.length){showRes();return;}
  updateSB(); render();
}

function showRes() {
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("resScreen").style.display="block";
  const pct=Math.round(ok/qs.length*100);
  document.getElementById("rScore").textContent=ok+"/"+qs.length;
  document.getElementById("rOk").textContent=ok;
  document.getElementById("rBad").textContent=bad;
  let trophy,title,msg;
  if(pct>=90){trophy="🏆";title="Xuất sắc!";msg="Em học rất giỏi! Thầy/cô tự hào về em! 🌟";}
  else if(pct>=70){trophy="🥈";title="Giỏi lắm!";msg="Em làm rất tốt! Cố gắng thêm một chút nhé! 💪";}
  else if(pct>=50){trophy="🥉";title="Cố lên!";msg="Em cần ôn thêm! Em có thể làm được! 📖";}
  else{trophy="📚";title="Ôn thêm nhé!";msg="Đừng nản lòng, ôn tập lại và thử lại nhé! 🌈";}
  document.getElementById("rTrophy").textContent=trophy;
  document.getElementById("rTitle").textContent=title;
  document.getElementById("rMsg").textContent=msg;
  if(pct>=70) confetti(40);
}

function goHome() {
  document.getElementById("resScreen").style.display="none";
  document.getElementById("homeScreen").style.display="block";
  cur=0;ok=0;bad=0;
}

function confetti(n) {
  const wrap=document.getElementById("cfWrap");
  const cols=["#FF7043","#FFC107","#66BB6A","#00BCD4","#AB47BC","#FF8A65"];
  for(let i=0;i<n;i++){
    const el=document.createElement("div"); el.className="cf";
    const c=cols[Math.floor(Math.random()*cols.length)];
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${c};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?"50%":"2px"};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;
    wrap.appendChild(el); el.addEventListener("animationend",()=>el.remove());
  }
}
</script>
